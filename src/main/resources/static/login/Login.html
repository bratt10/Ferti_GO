<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Ferti-Go</title>
  <link rel="stylesheet" href="../Inicio/styles.css"> 
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
  <header>  
    <nav class="container">
      <div class="logo"> Ferti-Go</div>
      <ul class="nav-links">
        <li><a href="../Inicio/Inicio.html#inicio">Inicio</a></li>
        <li><a href="../Inicio/Inicio.html#servicios">Sobre el Software</a></li>
        <li><a href="../Inicio/Inicio.html#como-funciona">Funcionalidades</a></li>
        <li><a href="../Inicio/Inicio.html#contacto">Solicitar Fertilizante</a></li>
      </ul>
      <a href="Login.html" class="btn-login">Iniciar Sesión</a>
    </nav>
  </header>

  <div class="login-container">
    <div class="login-box">
      <h2>Iniciar Sesión</h2>
      <form id="loginForm">
        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn-submit">Ingresar</button>
      </form>
      <!-- Div para mensajes de éxito o error -->
      <div id="mensaje" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
